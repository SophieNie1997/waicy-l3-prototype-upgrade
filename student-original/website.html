<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吐槽星球 - AI生成带字漫画</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');
        
        body {
            font-family: 'ZCOOL KuaiLe', cursive, sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #dbeafe 100%);
            min-height: 100vh;
        }
        
        .doraemon-blue { background-color: #0099e5; }
        .doraemon-blue-text { color: #0099e5; }
        
        .comic-frame {
            border: 3px solid #222;
            border-radius: 6px;
            background: #fff;
            box-shadow: 5px 5px 0 #222;
        }
        
        .btn-launch {
            background: linear-gradient(145deg, #ff6b6b, #ee5a5a);
            box-shadow: 0 4px 0 #c0392b;
            transition: all 0.1s;
        }
        .btn-launch:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #c0392b;
        }
        .btn-launch:disabled {
            background: #ccc;
            box-shadow: 0 4px 0 #999;
            cursor: not-allowed;
        }
        
        .page {
            display: none;
            animation: fadeIn 0.5s ease;
        }
        .page.active { display: flex; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }
        .shake-animation { animation: shake 0.5s ease-in-out infinite; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .float-animation { animation: float 3s ease-in-out infinite; }
        
        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
        
        #finalComicCanvas {
            width: 100%;
            border: 2px solid #333;
            border-radius: 4px;
            background: #fff;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- 页面1：首页 -->
        <div id="page1" class="page active flex-col gap-6">
            <div class="text-center">
                <div class="inline-block float-animation">
                    <h1 class="text-4xl font-bold doraemon-blue-text mb-2">🌍 吐槽星球</h1>
                    <p class="text-gray-600 text-lg">把不开心变成哆啦A梦漫画吧！</p>
                </div>
            </div>
            
            <div class="comic-frame p-6 bg-white">
                <div class="mb-4">
                    <label class="block text-xl doraemon-blue-text mb-3">💭 输入你想吐槽的话</label>
                    <textarea 
                        id="complaintInput"
                        class="w-full h-32 p-4 border-2 border-gray-300 rounded-xl text-lg 
                               focus:border-blue-400 focus:outline-none resize-none bg-gray-50"
                        placeholder="今天有什么不爽的？尽管说出来..."
                    ></textarea>
                </div>
                
                <div class="text-center text-sm text-gray-500 mb-4">
                    ✨ AI自动生成漫画 + 吐槽对话框，可直接保存
                </div>
                
                <button 
                    id="launchBtn"
                    class="btn-launch w-full py-4 text-white text-2xl rounded-2xl font-bold"
                >
                    🚀 吐槽发射
                </button>
            </div>
            
            <div class="text-center text-gray-400 text-sm">
                UI Design Workshop · Your First App
            </div>
        </div>
        
        <!-- 加载中状态 -->
        <div id="loadingPage" class="page flex-col items-center justify-center gap-6 py-20">
            <div class="text-6xl shake-animation">✏️</div>
            <div class="text-center">
                <p class="text-2xl doraemon-blue-text font-bold loading-dots">AI正在绘制漫画手稿</p>
                <p class="text-gray-500 mt-2">生成人物画面 + 合成吐槽对话框</p>
            </div>
        </div>
        
        <!-- 页面2：结果页 -->
        <div id="page2" class="page flex-col gap-6">
            <div class="text-center">
                <h2 class="text-3xl font-bold doraemon-blue-text">🎨 你的专属吐槽漫画</h2>
            </div>
            
            <!-- 最终合成漫画 -->
            <div class="comic-frame p-4 bg-white">
                <canvas id="finalComicCanvas" width="1024" height="1024"></canvas>
            </div>
            
            <!-- 按钮组 -->
            <div class="flex gap-3 px-2">
                <button 
                    id="backBtn"
                    class="flex-1 py-3 bg-gray-200 text-gray-700 text-lg rounded-xl font-bold
                           hover:bg-gray-300 transition"
                >
                    ← 返回
                </button>
                <button 
                    id="saveBtn"
                    class="flex-1 py-3 doraemon-blue text-white text-lg rounded-xl font-bold
                           hover:opacity-90 transition"
                >
                    💾 保存漫画
                </button>
                <button 
                    id="restartBtn"
                    class="flex-1 py-3 bg-green-500 text-white text-lg rounded-xl font-bold
                           hover:bg-green-600 transition"
                >
                    🔄 再来一张
                </button>
            </div>
        </div>
    </div>
    
    <script>
        const page1 = document.getElementById('page1');
        const page2 = document.getElementById('page2');
        const loadingPage = document.getElementById('loadingPage');
        const complaintInput = document.getElementById('complaintInput');
        const launchBtn = document.getElementById('launchBtn');
        const backBtn = document.getElementById('backBtn');
        const saveBtn = document.getElementById('saveBtn');
        const restartBtn = document.getElementById('restartBtn');
        const canvas = document.getElementById('finalComicCanvas');
        const ctx = canvas.getContext('2d');

        // 切换页面
        function showPage(page) {
            [page1, page2, loadingPage].forEach(p => p.classList.remove('active'));
            page.classList.add('active');
        }

        // 敏感词过滤
        function filterContent(text) {
            const negativeWords = ['去死', '讨厌', '恨', '垃圾', '废物', '傻逼', '操', '妈的', '该死'];
            let filtered = text;
            negativeWords.forEach(word => {
                const regex = new RegExp(word, 'gi');
                filtered = filtered.replace(regex, '⭐'.repeat(word.length));
            });
            return filtered;
        }

        // Canvas 绘制圆角矩形（对话气泡）
        function drawRoundRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
        }

        // Canvas 文字自动换行
        function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
            const chars = text.split('');
            let line = '';
            let currentY = y;
            
            for (let i = 0; i < chars.length; i++) {
                const testLine = line + chars[i];
                const metrics = ctx.measureText(testLine);
                const testWidth = metrics.width;
                
                if (testWidth > maxWidth && i > 0) {
                    ctx.fillText(line, x, currentY);
                    line = chars[i];
                    currentY += lineHeight;
                } else {
                    line = testLine;
                }
            }
            ctx.fillText(line, x, currentY);
            return currentY - y + lineHeight;
        }

        // 绘制完整漫画：背景图 + 双对话气泡 + 文字
        function renderComic(imageSrc, complaintText, replyText) {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            
            return new Promise((resolve) => {
                img.onload = () => {
                    // 清空画布
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    // 1. 绘制漫画人物背景图（下半部分）
                    const imgHeight = 650;
                    const imgY = canvas.height - imgHeight;
                    ctx.drawImage(img, 0, imgY, canvas.width, imgHeight);
                    
                    // 2. 绘制外边框（漫画分镜黑框）
                    ctx.lineWidth = 8;
                    ctx.strokeStyle = '#000';
                    ctx.strokeRect(4, 4, canvas.width - 8, canvas.height - 8);
                    
                    // 3. 绘制右侧吐槽气泡
                    const bubble1X = 520;
                    const bubble1Y = 60;
                    const bubble1W = 440;
                    const bubble1H = 280;
                    
                    ctx.fillStyle = '#fff';
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 4;
                    drawRoundRect(ctx, bubble1X, bubble1Y, bubble1W, bubble1H, 30);
                    ctx.fill();
                    ctx.stroke();
                    
                    // 气泡小尾巴
                    ctx.beginPath();
                    ctx.moveTo(bubble1X + 80, bubble1Y + bubble1H);
                    ctx.lineTo(bubble1X + 120, bubble1Y + bubble1H + 50);
                    ctx.lineTo(bubble1X + 150, bubble1Y + bubble1H);
                    ctx.closePath();
                    ctx.fillStyle = '#fff';
                    ctx.fill();
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 4;
                    ctx.stroke();
                    
                    // 吐槽文字
                    ctx.fillStyle = '#000';
                    ctx.font = 'bold 48px "ZCOOL KuaiLe", sans-serif';
                    ctx.textAlign = 'left';
                    wrapText(ctx, complaintText, bubble1X + 40, bubble1Y + 80, bubble1W - 80, 60);
                    
                    // 4. 绘制左侧回复气泡
                    const bubble2X = 60;
                    const bubble2Y = 180;
                    const bubble2W = 380;
                    const bubble2H = 200;
                    
                    ctx.fillStyle = '#fff';
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 4;
                    drawRoundRect(ctx, bubble2X, bubble2Y, bubble2W, bubble2H, 30);
                    ctx.fill();
                    ctx.stroke();
                    
                    // 气泡小尾巴
                    ctx.beginPath();
                    ctx.moveTo(bubble2X + bubble2W - 100, bubble2Y + bubble2H);
                    ctx.lineTo(bubble2X + bubble2W - 70, bubble2Y + bubble2H + 45);
                    ctx.lineTo(bubble2X + bubble2W - 40, bubble2Y + bubble2H);
                    ctx.closePath();
                    ctx.fillStyle = '#fff';
                    ctx.fill();
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 4;
                    ctx.stroke();
                    
                    // 回复文字
                    ctx.fillStyle = '#000';
                    ctx.font = 'bold 44px "ZCOOL KuaiLe", sans-serif';
                    wrapText(ctx, replyText, bubble2X + 35, bubble2Y + 70, bubble2W - 70, 55);
                    
                    resolve();
                };
                img.src = imageSrc;
            });
        }

        // 调用 AI 生成漫画底图
        async function generateComicBase(userText) {
            const filteredText = filterContent(userText);
            
            // 英文提示词：只生成干净的黑白漫画人物，不带文字，留出气泡位置
            const prompt = encodeURIComponent(
                `Doraemon manga style, black and white line art, single comic panel, Nobita character with exaggerated funny expression, upper body shot, clean background, no text, no words, Fujiko F. Fujio art style, hand drawn sketch`
            );
            
            const imageUrl = `https://image.pollinations.ai/prompt/${prompt}?width=1024&height=1024&model=flux&nologo=true&seed=${Date.now()}`;
            
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => resolve({ imageUrl, filteredText });
                img.onerror = () => reject(new Error('图片生成失败，请检查网络'));
                img.src = imageUrl;
            });
        }

        // 吐槽发射
        launchBtn.addEventListener('click', async () => {
            const text = complaintInput.value.trim();
            if (!text) {
                alert('先输入你想吐槽的话吧～');
                return;
            }
            
            showPage(loadingPage);
            launchBtn.disabled = true;
            
            try {
                // 1. 生成漫画底图
                const { imageUrl, filteredText } = await generateComicBase(text);
                
                // 2. 预设治愈回复（模拟AI转化负面情绪）
                const replies = [
                    '干脆先玩吧！',
                    '没事，明天再说～',
                    '吃点好吃的就好了！',
                    '躺平一会儿也没关系',
                    '反正天塌不下来'
                ];
                const reply = replies[Math.floor(Math.random() * replies.length)];
                
                // 3. Canvas 合成完整带字漫画
                await renderComic(imageUrl, filteredText, reply);
                
                showPage(page2);
            } catch (err) {
                alert('生成失败：' + err.message);
                showPage(page1);
            } finally {
                launchBtn.disabled = false;
            }
        });

        // 返回按钮
        backBtn.addEventListener('click', () => showPage(page1));

        // 重新吐槽
        restartBtn.addEventListener('click', () => {
            complaintInput.value = '';
            showPage(page1);
        });

        // 保存漫画图片
        saveBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = '吐槽星球漫画.png';
            link.href = canvas.toDataURL('image/png');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
