<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WAICY Lesson 3 Prototype Upgrade</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #171512;
      --paper: #fff8ea;
      --cream: #fffdf5;
      --line: rgba(23, 21, 18, 0.18);
      --teal: #16b8a7;
      --coral: #ff6048;
      --gold: #f7c948;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(22, 184, 167, 0.18), transparent 34%),
        linear-gradient(315deg, rgba(255, 96, 72, 0.14), transparent 36%),
        var(--paper);
    }

    main {
      width: min(1040px, calc(100% - 36px));
      margin: 0 auto;
      padding: 56px 0 42px;
    }

    .eyebrow {
      display: inline-flex;
      gap: 10px;
      align-items: center;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 253, 245, 0.74);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0;
    }

    h1 {
      max-width: 840px;
      margin: 22px 0 16px;
      font-size: clamp(42px, 7vw, 86px);
      line-height: 0.92;
      letter-spacing: 0;
    }

    .lead {
      max-width: 720px;
      margin: 0;
      font-size: 19px;
      line-height: 1.75;
      color: rgba(23, 21, 18, 0.76);
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 42px;
    }

    a {
      color: inherit;
    }

    .tile {
      min-height: 196px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 22px;
      padding: 22px;
      border: 2px solid var(--ink);
      border-radius: 8px;
      background: var(--cream);
      text-decoration: none;
      box-shadow: 6px 6px 0 rgba(23, 21, 18, 0.94);
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    .tile:hover,
    .tile:focus-visible {
      transform: translate(-2px, -2px);
      box-shadow: 10px 10px 0 rgba(23, 21, 18, 0.94);
      outline: none;
    }

    .tile strong {
      display: block;
      font-size: 24px;
      line-height: 1.15;
    }

    .tile span {
      display: block;
      font-size: 15px;
      line-height: 1.6;
      color: rgba(23, 21, 18, 0.68);
    }

    .primary {
      background: var(--teal);
      color: #fffdf5;
    }

    .primary span {
      color: rgba(255, 253, 245, 0.82);
    }

    .marker {
      display: inline-block;
      width: 34px;
      height: 10px;
      border-radius: 999px;
      background: var(--gold);
      box-shadow: 14px 14px 0 var(--coral);
    }

    .note {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      font-size: 14px;
      line-height: 1.7;
      color: rgba(23, 21, 18, 0.64);
    }

    @media (max-width: 820px) {
      main {
        width: min(100% - 28px, 620px);
        padding-top: 34px;
      }

      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">
      <span class="marker" aria-hidden="true"></span>
      WAICY Lesson 3
    </div>
    <h1>Prototype Upgrade Demo</h1>
    <p class="lead">
      这里是第三节课的回家复习网页。先看 A/B 对比，再打开老师升级版和第二节课原始版，观察同一个想法怎样通过产品思考、提示词和细节迭代变得更完整。
    </p>

    <section class="actions" aria-label="页面入口">
      <a class="tile primary" href="teacher-version/comparison.html">
        <strong>打开 A/B 对比</strong>
        <span>推荐先看这里：先观察两个原型，再进入差异拆解。</span>
      </a>
      <a class="tile" href="teacher-version/teacher-version.html">
        <strong>老师升级版</strong>
        <span>学生公开版不连接私密 API，但保留完整交互流程。</span>
      </a>
      <a class="tile" href="student-original/website.html">
        <strong>第二节课原始版</strong>
        <span>回看 Version 1，再对照升级后的界面与体验。</span>
      </a>
    </section>

    <p class="note">
      Public student version. No private API key is included in this GitHub Pages site.
    </p>
  </main>
</body>
</html>
